<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TuniBless — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
  <link rel="icon" type="image/png" href="assets/logo.png"/>
</head>
<body>

<div class="auth-page">
  <div class="auth-box fade-in">

    <!-- Logo -->
    <div class="auth-logo">
      <img src="assets/logo.png" alt="TuniBless"/>
      <h1>Tuni<span>Bless</span></h1>
      <p data-i18n="appName" style="font-size:.85rem;color:var(--text-muted);margin-top:.25rem" data-i18n="tagline"></p>
    </div>

    <!-- Lang toggle -->
    <div style="text-align:center;margin-bottom:1.5rem;">
      <button class="lang-btn" id="langBtn" style="margin:0 auto;">🇩🇪 DE</button>
    </div>

    <!-- Tabs -->
    <div class="auth-tabs">
      <button class="auth-tab active" id="tabLogin" data-i18n="auth.loginTitle"></button>
      <button class="auth-tab" id="tabRegister" data-i18n="nav.register"></button>
    </div>

    <!-- ── LOGIN FORM ──────────────────────────────────────── -->
    <form id="loginForm">
      <div class="form-group">
        <label data-i18n="auth.email"></label>
        <input type="email" id="loginEmail" data-i18n-ph="auth.email" required autocomplete="email"/>
      </div>
      <div class="form-group">
        <label data-i18n="auth.password"></label>
        <input type="password" id="loginPassword" data-i18n-ph="auth.password" required autocomplete="current-password"/>
      </div>
      <button type="submit" class="btn-submit" id="loginBtn">
        <span data-i18n="auth.loginBtn"></span>
      </button>
      <p class="text-center mt-2" style="font-size:.85rem;color:var(--text-muted);cursor:pointer"
         id="switchToRegisterLink" data-i18n="auth.switchToRegister"></p>
    </form>

    <!-- ── REGISTER FORM ───────────────────────────────────── -->
    <form id="registerForm" class="hidden">
      <div class="form-group">
        <label data-i18n="auth.name"></label>
        <input type="text" id="regName" data-i18n-ph="auth.name" required autocomplete="name"/>
      </div>
      <div class="form-group">
        <label data-i18n="auth.email"></label>
        <input type="email" id="regEmail" data-i18n-ph="auth.email" required autocomplete="email"/>
      </div>
      <div class="form-group">
        <label data-i18n="auth.password"></label>
        <input type="password" id="regPassword" data-i18n-ph="auth.password" required autocomplete="new-password" minlength="6"/>
      </div>
      <div class="form-group">
        <label data-i18n="auth.selectState"></label>
        <select id="regState" required>
          <option value="" data-i18n="auth.selectState"></option>
        </select>
      </div>
      <div class="form-group">
        <label data-i18n="auth.selectRole"></label>
        <select id="regRole" required>
          <option value="" data-i18n="auth.selectRole"></option>
          <option value="coordinator" data-i18n="dashboard.coordinator"></option>
          <option value="viewer" data-i18n="dashboard.viewer"></option>
        </select>
      </div>
      <button type="submit" class="btn-submit" id="registerBtn">
        <span data-i18n="auth.registerBtn"></span>
      </button>
      <p class="text-center mt-2" style="font-size:.85rem;color:var(--text-muted);cursor:pointer"
         id="switchToLoginLink" data-i18n="auth.switchToLogin"></p>
    </form>

  </div>
</div>

<script src="script.js"></script>
<script type="module">
import {
  auth, db, createUserWithEmailAndPassword,
  signInWithEmailAndPassword, onAuthStateChanged,
  doc, setDoc
} from "./firebase.js";

// Redirect if already logged in
onAuthStateChanged(auth, user => {
  if (user) window.location.href = "index.html";
});

// ── Populate states select ────────────────────────────────
const STATES_LIST = [
  "tunis","ariana","ben_arous","manouba","nabeul","zaghouan",
  "bizerte","beja","jendouba","kef","siliana","sousse","monastir",
  "mahdia","sfax","kairouan","kasserine","sidi_bouzid",
  "gabes","mednine","tataouine","gafsa","tozeur","kebili"
];

function populateStates() {
  const sel = document.getElementById("regState");
  if (!sel) return;
  sel.innerHTML = `<option value="">${t("auth.selectState")}</option>`;
  STATES_LIST.forEach(s => {
    const opt = document.createElement("option");
    opt.value = s;
    opt.textContent = t(`states.${s}`);
    sel.appendChild(opt);
  });
}

// Re-populate on lang change (hook into applyTranslations)
const origApply = window.applyTranslations;
window.applyTranslations = function() {
  if (origApply) origApply();
  populateStates();
  // also re-set option texts
  document.querySelectorAll("option[data-i18n]").forEach(el => {
    el.textContent = t(el.getAttribute("data-i18n"));
  });
};

document.addEventListener("DOMContentLoaded", () => {
  populateStates();
});

// ── Tabs ──────────────────────────────────────────────────
const tabLogin    = document.getElementById("tabLogin");
const tabRegister = document.getElementById("tabRegister");
const loginForm   = document.getElementById("loginForm");
const registerForm= document.getElementById("registerForm");
const switchToR   = document.getElementById("switchToRegisterLink");
const switchToL   = document.getElementById("switchToLoginLink");

function showLogin() {
  loginForm.classList.remove("hidden");
  registerForm.classList.add("hidden");
  tabLogin.classList.add("active");
  tabRegister.classList.remove("active");
}
function showRegister() {
  registerForm.classList.remove("hidden");
  loginForm.classList.add("hidden");
  tabRegister.classList.add("active");
  tabLogin.classList.remove("active");
}
tabLogin.addEventListener("click", showLogin);
tabRegister.addEventListener("click", showRegister);
switchToR?.addEventListener("click", showRegister);
switchToL?.addEventListener("click", showLogin);

// ── Login ──────────────────────────────────────────────────
loginForm.addEventListener("submit", async e => {
  e.preventDefault();
  const email = document.getElementById("loginEmail").value.trim();
  const pass  = document.getElementById("loginPassword").value;
  const btn   = document.getElementById("loginBtn");
  if (!email || !pass) { showToast("fillFields","warning"); return; }

  btn.disabled = true;
  btn.innerHTML = '<div class="spinner" style="width:20px;height:20px;border-width:2px"></div>';
  try {
    await signInWithEmailAndPassword(auth, email, pass);
    showToast("loginSuccess","success");
    setTimeout(() => window.location.href = "index.html", 800);
  } catch(err) {
    const msg = parseFirebaseError(err.code);
    showToast(null,"error", msg);
    btn.disabled = false;
    btn.innerHTML = `<span>${t("auth.loginBtn")}</span>`;
  }
});

// ── Register ───────────────────────────────────────────────
registerForm.addEventListener("submit", async e => {
  e.preventDefault();
  const name  = document.getElementById("regName").value.trim();
  const email = document.getElementById("regEmail").value.trim();
  const pass  = document.getElementById("regPassword").value;
  const state = document.getElementById("regState").value;
  const role  = document.getElementById("regRole").value;
  const btn   = document.getElementById("registerBtn");

  if (!name||!email||!pass||!state||!role) { showToast("fillFields","warning"); return; }
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner" style="width:20px;height:20px;border-width:2px"></div>';
  try {
    const cred = await createUserWithEmailAndPassword(auth, email, pass);
    await setDoc(doc(db,"users",cred.user.uid), {
      name, email, state, role,
      createdAt: new Date().toISOString()
    });
    showToast("registerSuccess","success");
    setTimeout(() => window.location.href = "index.html", 800);
  } catch(err) {
    const msg = parseFirebaseError(err.code);
    showToast(null,"error", msg);
    btn.disabled = false;
    btn.innerHTML = `<span>${t("auth.registerBtn")}</span>`;
  }
});

function parseFirebaseError(code) {
  const map = {
    "auth/user-not-found":      "المستخدم غير موجود / Benutzer nicht gefunden",
    "auth/wrong-password":      "كلمة المرور خاطئة / Falsches Passwort",
    "auth/email-already-in-use":"البريد مستخدم بالفعل / E-Mail bereits vergeben",
    "auth/weak-password":       "كلمة المرور ضعيفة / Passwort zu schwach",
    "auth/invalid-email":       "بريد إلكتروني غير صالح / Ungültige E-Mail",
  };
  return map[code] || code;
}
</script>
</body>
</html>
